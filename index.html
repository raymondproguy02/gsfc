<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Consciousness of the Son</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- ============================================
    TOAST
    ============================================ -->
    <div class="toast" id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage">Done!</span>
    </div>

    <!-- ============================================
    DRAWER OVERLAY
    ============================================ -->
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <!-- ============================================
    DRAWER
    ============================================ -->
    <aside class="drawer" id="drawer">
        <div class="drawer-header">
            <h2><i class="fas fa-bible"></i> All Lessons</h2>
            <button class="drawer-close" id="drawerClose" aria-label="Close menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="drawer-body">
            <div class="drawer-progress">
                <div class="progress-stats">
                    <span>Progress</span>
                    <span id="drawerProgressText">0 / 0</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="drawerProgressFill"></div>
                </div>
            </div>
            <div class="drawer-lesson-list" id="drawerLessonList">
                <!-- Populated by JS -->
            </div>
        </div>
    </aside>

    <!-- ============================================
    HEADER
    ============================================ -->
    <header class="site-header">
        <div class="container header-inner">
            <div class="header-brand">
                <i class="fas fa-cross brand-icon"></i>
                <div>
                    <h1>
                        The Consciousness of the Son
                        <span class="brand-sub">Grace Spring Family Church</span>
                    </h1>
                </div>
            </div>
            <div class="header-actions">
                <button id="drawerToggle" aria-label="Open lesson menu" title="All Lessons">
                    <i class="fas fa-bars"></i>
                </button>
                <button id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="progress-badge">
                    <i class="fas fa-check-circle"></i>
                    <span id="headerProgress">0%</span>
                </div>
            </div>
        </div>
    </header>

    <!-- ============================================
    DAILY VERSE
    ============================================ -->
    <div class="container">
        <div class="daily-verse-container" id="dailyVerse">
            <div class="daily-verse-label">📖 Verse of the Day</div>
            <div class="daily-verse-text" id="dailyVerseText">"He that spared not his own Son..."</div>
            <div class="daily-verse-ref" id="dailyVerseRef">— Romans 8:32</div>
        </div>
    </div>

    <!-- ============================================
    MAIN
    ============================================ -->
    <main class="main-content">
        <div class="container" id="app">
            <!-- Rendered by JS -->
        </div>
    </main>

    <!-- ============================================
    FOOTER
    ============================================ -->
    <footer class="site-footer">
        <div class="container">
            <p>
                <span class="footer-heart">♥</span>
                <span class="footer-church">Grace Spring Family Church</span>
                &mdash; The Consciousness of the Son &bull; Transformation Series
            </p>
            <p style="font-size:12px; margin-top:4px; opacity:0.6;">
                &copy; 2026 &bull; All glory to God
            </p>
        </div>
    </footer>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
